name: Beecthor Bitcoin Summary

on:
  schedule:
    # Daily at 20:00 UTC → 21:00 Madrid (CET, winter) / 22:00 Madrid (CEST, summer)
    - cron: "0 20 * * *"
  workflow_dispatch: # Allow manual triggering from the Actions tab

permissions:
  contents: write # Required to commit last_video_id.txt back to the repo

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Beecthor summarizer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/summarize_beecthor.py

      - name: Commit updated last_video_id.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_video_id.txt
          # Only commit if the file actually changed
          git diff --staged --quiet || git commit -m "chore: update last processed video ID [skip ci]"
          git push
